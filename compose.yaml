x-runtime-registration: &runtime-registration
  image: curlimages/curl:8.11.1
  entrypoint: ["/bin/sh"]
  environment:
    LAP_URL: http://lap:4000
    LAP_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local}
    RUNTIME_API_SPEC: claude_managed_agents
  command:
    - -c
    - |
      set -eu

      until curl -fsS "$$LAP_URL/health" >/dev/null; do
        sleep 1
      done
      until curl -fsS "$$RUNTIME_API_BASE/health" >/dev/null; do
        sleep 1
      done

      create_payload=$$(printf '{"alias":"%s","api_spec":"%s","api_base":"%s","api_key":"%s"}' "$$RUNTIME_ALIAS" "$$RUNTIME_API_SPEC" "$$RUNTIME_API_BASE" "$$RUNTIME_API_KEY")
      update_payload=$$(printf '{"api_base":"%s","api_key":"%s"}' "$$RUNTIME_API_BASE" "$$RUNTIME_API_KEY")

      curl -fsS -X POST "$$LAP_URL/api/runtime-harnesses" \
        -H "Authorization: Bearer $$LAP_MASTER_KEY" \
        -H "Content-Type: application/json" \
        -d "$$create_payload" \
      || curl -fsS -X PUT "$$LAP_URL/api/runtime-harnesses/$$RUNTIME_ALIAS" \
        -H "Authorization: Bearer $$LAP_MASTER_KEY" \
        -H "Content-Type: application/json" \
        -d "$$update_payload"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lap
      POSTGRES_PASSWORD: lap
      POSTGRES_DB: litellm_agents
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lap -d litellm_agents"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Object storage backing per-session workspaces (see docs/workspace.md).
  # API port 9000 is used internally by `lap`/`opencode`; the console (9001)
  # and API are also exposed on localhost so presigned URLs signed against
  # MINIO_PUBLIC_ENDPOINT are reachable from the host browser.
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "127.0.0.1:${MINIO_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      # The minio image has no curl/wget; bash (present) with /dev/tcp is a
      # plain TCP-reachability check, good enough to gate startup ordering.
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/127.0.0.1/9000"]
      interval: 5s
      timeout: 5s
      retries: 20

  lap:
    build:
      context: .
      args:
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org}
    ports:
      - "4000:4000"
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local}
      DATABASE_URL: postgres://lap:lap@postgres:5432/litellm_agents
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      # Base URL the agent runtime (opencode) uses to reach the gateway's
      # platform MCPs (e.g. request_human_approval) at {url}/mcp/platform/{agent}.
      # `lap` is this service's name on the compose network.
      LITELLM_PROXY_BASE_URL: ${LITELLM_PROXY_BASE_URL:-http://lap:4000}
      # Browser-facing base URL used in links returned to users (e.g. the
      # expose_port app URLs). Distinct from LITELLM_PROXY_BASE_URL, which is
      # the compose-internal address runtimes use to reach the gateway.
      LAP_PUBLIC_BASE_URL: ${LAP_PUBLIC_BASE_URL:-http://localhost:4000}
      # Internal (docker-network) endpoint used by lap itself to talk to MinIO.
      MINIO_ENDPOINT: http://minio:9000
      # Endpoint used to SIGN presigned URLs. Must be reachable from the
      # browser, so it's the host-mapped port, not the docker-network name.
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-http://localhost:9000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-litellm-agent-control-plane}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_HEADERS: ${OTEL_EXPORTER_OTLP_HEADERS:-}
    volumes:
      # Mount the gateway config so model-list edits only need a restart, not a rebuild.
      - ./deploy/render.config.yaml:/app/deploy.config.yaml:ro
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  opencode:
    profiles: ["opencode"]
    build: ./templates/opencode
    environment:
      LITELLM_BASE_URL: http://lap:4000/v1
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY:-sk-local}
      LITELLM_MODELS: ${OPENCODE_MODELS:-}
      # lap's outbound CONNECT proxy — per-session opencode processes route all
      # HTTPS traffic through it so network access is enforced (approval_mode +
      # domain whitelist) at the network layer, not just when a tool self-reports
      # a permission ask. Unset (empty) to disable and restore unrestricted egress.
      LAP_EGRESS_PROXY_URL: ${LAP_EGRESS_PROXY_URL:-http://lap:3128}
      # s3fs mounts each session's workspace bucket from here (internal endpoint).
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - opencode-data:/data
    # s3fs (FUSE) needs to create a device node and call mount(2); SYS_ADMIN +
    # /dev/fuse is the minimal grant for that (narrower than `privileged: true`).
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    depends_on:
      - lap
      - minio

  register-opencode:
    <<: *runtime-registration
    profiles: ["opencode"]
    environment:
      LAP_URL: http://lap:4000
      LAP_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local}
      RUNTIME_ALIAS: local-opencode
      RUNTIME_API_SPEC: claude_managed_agents
      RUNTIME_API_BASE: http://opencode:8080
      RUNTIME_API_KEY: ${OPENCODE_RUNTIME_API_KEY:-local-opencode-key}
    depends_on:
      - lap
      - opencode

  deepagents:
    profiles: ["deepagents"]
    build: ./templates/deepagents
    environment:
      DEFAULT_MODEL: ${DEEPAGENTS_MODEL:-anthropic:claude-sonnet-4-5}
      RUNTIME_API_KEY: ${DEEPAGENTS_RUNTIME_API_KEY:-local-deepagents-key}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - deepagents-data:/data
    depends_on:
      - lap

  register-deepagents:
    <<: *runtime-registration
    profiles: ["deepagents"]
    environment:
      LAP_URL: http://lap:4000
      LAP_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local}
      RUNTIME_ALIAS: local-deepagents
      RUNTIME_API_SPEC: claude_managed_agents
      RUNTIME_API_BASE: http://deepagents:8080
      RUNTIME_API_KEY: ${DEEPAGENTS_RUNTIME_API_KEY:-local-deepagents-key}
    depends_on:
      - lap
      - deepagents

  hermes:
    profiles: ["hermes"]
    build: ./templates/hermes
    environment:
      DEFAULT_MODEL: ${HERMES_MODEL:-anthropic/claude-sonnet-4-5}
      RUNTIME_API_KEY: ${HERMES_RUNTIME_API_KEY:-local-hermes-key}
      LAP_BASE_URL: http://lap:4000
      LAP_API_KEY: ${LITELLM_MASTER_KEY:-sk-local}
    volumes:
      - hermes-data:/data
    depends_on:
      - lap

  register-hermes:
    <<: *runtime-registration
    profiles: ["hermes"]
    environment:
      LAP_URL: http://lap:4000
      LAP_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local}
      RUNTIME_ALIAS: local-hermes
      RUNTIME_API_SPEC: claude_managed_agents
      RUNTIME_API_BASE: http://hermes:8080
      RUNTIME_API_KEY: ${HERMES_RUNTIME_API_KEY:-local-hermes-key}
    depends_on:
      - lap
      - hermes

  openclaw:
    profiles: ["openclaw"]
    build: ./templates/openclaw
    environment:
      LITELLM_BASE_URL: http://lap:4000/v1
      LITELLM_API_KEY: ${LITELLM_MASTER_KEY:-sk-local}
      LITELLM_MODELS: ${OPENCLAW_MODELS:-claude-sonnet-4-6}
      OPENCLAW_AGENT_MODEL: ${OPENCLAW_AGENT_MODEL:-litellm/claude-sonnet-4-6}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-local-openclaw-token}
      RUNTIME_API_KEY: ${OPENCLAW_RUNTIME_API_KEY:-local-openclaw-key}
    volumes:
      - openclaw-data:/data
    depends_on:
      - lap

  register-openclaw:
    <<: *runtime-registration
    profiles: ["openclaw"]
    environment:
      LAP_URL: http://lap:4000
      LAP_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local}
      RUNTIME_ALIAS: local-openclaw
      RUNTIME_API_SPEC: claude_managed_agents
      RUNTIME_API_BASE: http://openclaw:8080
      RUNTIME_API_KEY: ${OPENCLAW_RUNTIME_API_KEY:-local-openclaw-key}
    depends_on:
      - lap
      - openclaw

  # Test fixture for the "导入智能体" (import agent) A2A flow. Not a managed
  # runtime harness (a2a's expose_runtime_harness() is false) — this is the
  # remote agent that gets discovered/imported/executed via source.raw.url.
  # Must be reached by service name, not localhost: validate_connector_endpoint()
  # (src/http/managed_agents/source_management.rs) rejects loopback/link-local
  # endpoints, so paste `http://a2a-agent:8080` (or a /scenarios/<name> path,
  # see scripts/a2a_agent/main.py) as the import dialog's 服务地址.
  a2a-agent:
    profiles: ["a2a"]
    build: ./scripts/a2a_agent
    ports:
      - "127.0.0.1:${A2A_AGENT_PORT:-8090}:8080"

  a2a-opencode-test:
    profiles: ["a2a-opencode"]
    build: ./a2a-opencode-agent
    ports:
      - "9200:9200"
    environment:
      # Default routes through `lap` to deepseek-chat, which lap actually has
      # configured (deploy/render.config.yaml) — reliable for the governance
      # smoke test. `lap` exposes deepseek-chat via its Anthropic-compatible
      # /v1/messages surface, hence GATEWAY_KIND=anthropic.
      #
      # To use opencode's own free Opencode Zen models instead (e.g.
      # opencode/big-pickle) — no gateway routing, but the free backend is
      # occasionally slow/unstable — unset GATEWAY_BASE_URL:
      #   GATEWAY_BASE_URL= docker compose --profile a2a-opencode up a2a-opencode-test
      GATEWAY_KIND: ${GATEWAY_KIND:-anthropic}
      GATEWAY_BASE_URL: ${GATEWAY_BASE_URL:-http://lap:4000}
      GATEWAY_API_KEY: ${LITELLM_MASTER_KEY:-sk-local}
      OPENCODE_MODEL: ${OPENCODE_MODEL:-deepseek-chat}
      A2A_PUBLIC_URL: ${A2A_PUBLIC_URL:-http://a2a-opencode-test:9200/}


volumes:
  postgres-data:
  minio-data:
  opencode-data:
  deepagents-data:
  hermes-data:
  openclaw-data:
