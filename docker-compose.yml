services:
  postgres:
    image: postgres:16-alpine
    container_name: litellm-agents-postgres
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
      POSTGRES_DB: litellm_agents
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm_agents"]
      interval: 2s
      timeout: 2s
      retries: 30

volumes:
  postgres-data:
