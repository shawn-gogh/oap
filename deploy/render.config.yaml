# Hosted deploy config (e.g. Render).
#
# Provider API keys are NOT stored here. They live in the database, added via
# the Settings UI (/settings -> POST /api/providers/{id}) and encrypted with the
# master key. credential_overrides injects them per request.
#
# A database is required: it backs provider credentials AND the sessions/agents
# UI. Without DATABASE_URL the server returns 503 "database is not configured"
# on those routes.
#
# NOTE: the gateway supports exactly one "provider/*" wildcard route. Provider
# API keys are loaded from the database at request time.
#
# This deployment defaults to DeepSeek. The Anthropic/OpenAI model routes are
# intentionally omitted so the gateway only offers DeepSeek models. The
# provider/runtime *definitions* still exist in code (so built-in runtimes such
# as claude_managed_agents don't break) and are merely hidden from the UI via
# src/site_config.rs.
model_list:
  # DeepSeek (OpenAI Chat Completions-compatible). The gateway's deepseek
  # provider translates the Anthropic Messages surface to /v1/chat/completions.
  - model_name: deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_base: https://api.deepseek.com
      api_key: os.environ/DEEPSEEK_API_KEY

  - model_name: deepseek-reasoner
    litellm_params:
      model: deepseek/deepseek-reasoner
      api_base: https://api.deepseek.com
      api_key: os.environ/DEEPSEEK_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
