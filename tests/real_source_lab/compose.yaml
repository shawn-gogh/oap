name: lap-real-source-lab

services:
  opencode-native:
    build: ./opencode
    command: ["opencode", "serve", "--hostname", "0.0.0.0", "--port", "4096"]
    working_dir: /workspace
    environment:
      OPENCODE_SERVER_USERNAME: ${OPENCODE_SERVER_USERNAME:-opencode}
      OPENCODE_SERVER_PASSWORD: ${OPENCODE_SERVER_PASSWORD:-native-opencode}
    ports:
      - "127.0.0.1:${OPENCODE_NATIVE_PORT:-14096}:4096"
    networks:
      lap:
        aliases:
          - opencode-native

  langgraph-native:
    build: ./langgraph
    command:
      - langgraph
      - dev
      - --host
      - 0.0.0.0
      - --port
      - "8123"
      - --no-browser
    ports:
      - "127.0.0.1:${LANGGRAPH_NATIVE_PORT:-18123}:8123"
    networks:
      lap:
        aliases:
          - langgraph-native

  openapi-native:
    build: ./openapi
    ports:
      - "127.0.0.1:${OPENAPI_NATIVE_PORT:-18080}:8080"
    networks:
      lap:
        aliases:
          - openapi-native

  crewai-native:
    build: ./crewai
    environment:
      OPENAI_API_BASE: ${OPENAI_API_BASE:-http://lap:4000/v1}
      OPENAI_API_KEY: ${LITELLM_MASTER_KEY:-sk-local}
      CREWAI_MODEL: ${CREWAI_MODEL:-openai/deepseek-chat}
    ports:
      - "127.0.0.1:${CREWAI_NATIVE_PORT:-18081}:8080"
    networks:
      lap:
        aliases:
          - crewai-native

networks:
  lap:
    external: true
    name: ${LAP_DOCKER_NETWORK:-litellm-agent-control-plane_default}
